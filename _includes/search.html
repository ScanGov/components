<form id="search-form" action="/search/">
  <label class="pb-2 d-block" for="search-input">Search:</label>
  <div class="d-flex gap-2">
    <input
      name="search"
      type="text"
      class="form-control"
      id="search-input"
      autocomplete="off">
    <input
      type="submit"
      value="Go"
      class="btn btn-primary">
  </div>
</form>
